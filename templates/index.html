{% extends "base.html" %}

{% block title %}FashionHub - Premium Clothing Store{% endblock %}

{% block content %}
<style>
    /* Hero Section */
    .hero {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        position: relative;
        overflow: hidden;
    }
    
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('https://images.unsplash.com/photo-1445205170230-053b83016050?w=1200') center/cover;
        opacity: 0.3;
        z-index: 0;
    }
    
    .hero-content {
        position: relative;
        z-index: 1;
        padding: 60px 20px;
    }
    
    .hero h1 {
        font-size: 3.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        animation: fadeInUp 0.8s ease;
    }
    
    .hero p {
        font-size: 1.3rem;
        margin-bottom: 30px;
        animation: fadeInUp 0.8s ease 0.2s both;
    }
    
    .hero .btn {
        padding: 12px 35px;
        font-size: 1.1rem;
        border-radius: 50px;
        animation: fadeInUp 0.8s ease 0.4s both;
        background: #e74c3c;
        border: none;
        transition: all 0.3s ease;
    }
    
    .hero .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        background: #c0392b;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Featured Products Section */
    .featured {
        padding: 60px 20px;
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .featured h2 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 50px;
        position: relative;
    }
    
    .featured h2::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: #e74c3c;
    }
    
    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
    }
    
    .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
        cursor: pointer;
    }
    
    .product-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    
    .product-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        transition: all 0.3s ease;
    }
    
    .product-card:hover img {
        transform: scale(1.05);
    }
    
    .product-card h4 {
        padding: 15px 15px 5px;
        font-size: 1rem;
        font-weight: 600;
        color: #2c3e50;
    }
    
    .product-card .price {
        padding: 0 15px;
        color: #e74c3c;
        font-size: 1.2rem;
        font-weight: 700;
        margin: 5px 0;
    }
    
    .product-card .rating {
        padding: 0 15px;
        color: #f39c12;
        font-size: 0.85rem;
        margin-bottom: 10px;
    }
    
    .product-card .btn {
        margin: 10px 15px 15px;
        width: calc(100% - 30px);
        background: #2c3e50;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 25px;
        transition: all 0.3s ease;
    }
    
    .product-card .btn:hover {
        background: #e74c3c;
    }
    
    /* Categories Section */
    .categories {
        background: #f8f9fa;
        padding: 60px 20px;
    }
    
    .categories h2 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 50px;
        position: relative;
    }
    
    .categories h2::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: #e74c3c;
    }
    
    .categories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .category-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        text-align: center;
        transition: all 0.3s ease;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    
    .category-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    
    .category-card h4 {
        padding: 20px;
        font-size: 1.2rem;
        font-weight: 600;
        color: #2c3e50;
    }
    
    /* Banner Section */
    .banner {
        background: linear-gradient(135deg, #2c3e50, #1a252f);
        color: white;
        padding: 60px 20px;
        text-align: center;
    }
    
    .banner h2 {
        font-size: 2rem;
        margin-bottom: 20px;
    }
    
    .banner p {
        font-size: 1.1rem;
        margin-bottom: 30px;
    }
    
    .banner .btn {
        background: #e74c3c;
        color: white;
        padding: 12px 35px;
        border-radius: 50px;
        text-decoration: none;
        transition: all 0.3s ease;
    }
    
    .banner .btn:hover {
        background: #c0392b;
        transform: translateY(-3px);
    }
    
    @media (max-width: 768px) {
        .hero h1 {
            font-size: 2rem;
        }
        .hero p {
            font-size: 1rem;
        }
        .featured h2, .categories h2 {
            font-size: 1.8rem;
        }
        .product-grid {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
    }
    
    @media (max-width: 576px) {
        .product-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-content">
        <h1>Discover Your Style</h1>
        <p>Shop the latest fashion trends at unbeatable prices</p>
        <a href="/shop" class="btn btn-primary">Shop Now <i class="fas fa-arrow-right ms-2"></i></a>
    </div>
</section>

<!-- Categories -->
<section class="categories">
    <div class="container">
        <h2>Shop by Category</h2>
        <div class="categories-grid">
            <div class="category-card" onclick="location.href='/shop?category=Men'">
                <img src="https://images.unsplash.com/photo-1617137968427-85924c800a22?w=400" alt="Men's Fashion">
                <h4>Men's Fashion</h4>
            </div>
            <div class="category-card" onclick="location.href='/shop?category=Women'">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=400" alt="Women's Fashion">
                <h4>Women's Fashion</h4>
            </div>
            <div class="category-card" onclick="location.href='/shop?category=Kids'">
                <img src="https://images.unsplash.com/photo-1519457431-44ccd64a579b?w=400" alt="Kids' Fashion">
                <h4>Kids' Fashion</h4>
            </div>
            <div class="category-card" onclick="location.href='/shop?category=Accessories'">
                <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=400" alt="Accessories">
                <h4>Accessories</h4>
            </div>
        </div>
    </div>
</section>


{% endblock %}
