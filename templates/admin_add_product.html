{% extends "base.html" %}

{% block title %}Admin - Add Product{% endblock %}

{% block content %}
<style>
    .admin-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .form-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: #333;
    }
    .form-control {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 1rem;
    }
    .form-control:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .btn-submit {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 40px;
        font-weight: 600;
        width: 100%;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
    }
    .btn-back {
        background: #6c757d;
        color: white;
        padding: 10px 24px;
        border: none;
        border-radius: 40px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
    }
</style>

<div class="admin-container">
    <div class="form-card">
        <h2 class="text-center mb-4"><i class="fas fa-plus-circle"></i> Add New Product</h2>
        
        <div id="alertMsg"></div>
        
        <form method="POST">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" name="price" class="form-control" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Category *</label>
                <select name="category" class="form-control" required>
                    <option value="">Select Category</option>
                    <option value="Men">Men's Fashion</option>
                    <option value="Women">Women's Fashion</option>
                    <option value="Kids">Kids' Fashion</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Footwear">Footwear</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Image URL *</label>
                <input type="url" name="image" class="form-control" placeholder="https://..." required>
            </div>
            
            <div class="form-group">
                <label>Stock Quantity *</label>
                <input type="number" name="stock" class="form-control" value="10" required>
            </div>
            
            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Add Product
            </button>
        </form>
        
        <div class="text-center">
            <a href="/admin/fetch-products" class="btn-back">← Fetch from API</a>
            <a href="/shop" class="btn-back ms-2">View Shop →</a>
        </div>
    </div>
</div>

<script>
    // Check for flash messages from server
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            showAlert('{{ message }}', '{{ category }}');
        {% endfor %}
    {% endwith %}
    
    function showAlert(message, type) {
        const container = document.getElementById('alertMsg');
        container.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
        setTimeout(() => {
            const alert = container.querySelector('.alert');
            if (alert) alert.remove();
        }, 3000);
    }
</script>
{% endblock %}
