{% extends "base.html" %}

{% block title %}Admin - Fetch Products{% endblock %}

{% block content %}
<style>
    .admin-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .fetch-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    .stats-card {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        margin-bottom: 20px;
    }
    .stats-number {
        font-size: 3rem;
        font-weight: 700;
    }
    .btn-fetch {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 40px;
        font-weight: 600;
        width: 100%;
    }
    .btn-danger {
        background: #dc2626;
    }
</style>

<div class="admin-container">
    <div class="fetch-card">
        <h2 class="text-center mb-4"><i class="fas fa-database"></i> Product Manager</h2>
        
        <div class="stats-card">
            <div class="stats-number">{{ product_count }}</div>
            <div>Products in Database</div>
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Select API Source:</label>
                <select name="source" class="form-select" required>
                    <option value="fakestore">FakeStore API (20+ products)</option>
                    <option value="dummyjson">DummyJSON API (30+ products)</option>
                </select>
            </div>
            <button type="submit" class="btn-fetch">
                <i class="fas fa-download"></i> Fetch & Store Products
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/admin/add-product" class="btn btn-primary">+ Add Manually</a>
            <a href="/shop" class="btn btn-outline-secondary ms-2">View Shop →</a>
        </div>
    </div>
</div>
{% endblock %}
