{% extends "base.html" %}

{% block title %}Register - FashionHub{% endblock %}

{% block content %}
<style>
    .register-container {
        max-width: 500px;
        margin: 60px auto;
        padding: 0 20px;
    }
    .register-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .btn-register {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 12px;
        border-radius: 40px;
        border: none;
        font-weight: 600;
        width: 100%;
    }
    .btn-google {
        background: white;
        color: #333;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 40px;
        font-weight: 600;
        width: 100%;
        text-decoration: none;
        display: inline-block;
        text-align: center;
    }
    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
    }
    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #ddd;
    }
    .divider span {
        padding: 0 10px;
        color: #666;
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2 class="text-center mb-4"><i class="fas fa-tshirt"></i> FashionHub</h2>
        <h4 class="text-center mb-4">Create Account</h4>
        
        <div id="alertMsg"></div>
        
        <div class="mb-3">
            <input type="text" id="name" class="form-control" placeholder="Full Name">
        </div>
        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Email Address">
        </div>
        <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password (min 6 characters)">
        </div>
        <div class="mb-3">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
        </div>
        <button onclick="register()" class="btn-register">Create Account <i class="fas fa-user-plus ms-2"></i></button>
        
        <div class="divider">
            <span>OR</span>
        </div>
        
        <a href="/login/google" class="btn-google">
            <i class="fab fa-google me-2"></i> Sign up with Google
        </a>
        
        <div class="text-center mt-4">
            <p>Already have an account? <a href="/login">Login here</a></p>
            <a href="/">← Back to Home</a>
        </div>
    </div>
</div>

<script>
    async function register() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        if (!name || !email || !password) {
            showAlert('Please fill all fields', 'danger');
            return;
        }
        
        if (password !== confirm) {
            showAlert('Passwords do not match', 'danger');
            return;
        }
        
        if (password.length < 6) {
            showAlert('Password must be at least 6 characters', 'danger');
            return;
        }
        
        try {
            const res = await axios.post('/api/register', { name, email, password });
            if (res.data.success) {
                showAlert(res.data.message, 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            }
        } catch (error) {
            showAlert(error.response?.data?.message || 'Registration failed', 'danger');
        }
    }
    
    function showAlert(message, type) {
        const container = document.getElementById('alertMsg');
        container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => container.innerHTML = '', 3000);
    }
</script>
{% endblock %}
